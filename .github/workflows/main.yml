name: Build Standalone App

on:
  workflow_dispatch: # Allows you to manually trigger this anytime from the GitHub UI

jobs:
  publish:
    runs-on: windows-latest # Windows is required to pack WinUI 3 / Windows apps

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Matches your .NET 8 app version

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Standalone Executable
      # This compiles it into a single-file, self-contained Windows x64 .exe
      # Added -p:PlatformTarget=x64 to force compatibility with win-x64
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PlatformTarget=x64 -o ./publish-output
      # run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish-output

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: FarmManager-Standalone-App
        path: ./publish-output/
